apiVersion: v1
kind: Pod
metadata:
  name: {{ include "github-sts.fullname" . }}-test-ready
  labels:
    {{- include "github-sts.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: readiness-check
      image: busybox:1.37
      command:
        - /bin/sh
        - -c
        - |
          wget -qO- http://{{ include "github-sts.fullname" . }}:{{ .Values.service.port }}/ready
          if [ $? -ne 0 ]; then
            echo "Readiness check failed"
            exit 1
          fi
          echo "Readiness check passed"
