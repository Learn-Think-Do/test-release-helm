apiVersion: v1
kind: Pod
metadata:
  name: {{ include "github-sts.fullname" . }}-test-health
  labels:
    {{- include "github-sts.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health-check
      image: busybox:1.37
      command:
        - /bin/sh
        - -c
        - |
          RESPONSE=$(wget -qO- http://{{ include "github-sts.fullname" . }}:{{ .Values.service.port }}/health)
          echo "Response: ${RESPONSE}"
          echo "${RESPONSE}" | grep -q '"status"' || exit 1
          echo "Health check passed"
