{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "github-sts.fullname" . }}-test-metrics
  labels:
    {{- include "github-sts.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: metrics-check
      image: busybox:1.37
      command:
        - /bin/sh
        - -c
        - |
          RESPONSE=$(wget -qO- http://{{ include "github-sts.fullname" . }}:{{ .Values.service.port }}/metrics)
          echo "${RESPONSE}" | grep -q '{{ .Values.metrics.prefix }}_' || exit 1
          echo "Metrics check passed"
{{- end }}
