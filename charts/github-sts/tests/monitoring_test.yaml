suite: Optional Features - Monitoring
templates:
  - servicemonitor.yaml
  - podmonitor.yaml
release:
  name: test
  namespace: github-sts
tests:
  # =========================================================================
  # ServiceMonitor
  # =========================================================================
  - it: should not create ServiceMonitor by default
    template: servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ServiceMonitor when enabled
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - hasDocuments:
          count: 1

  - it: should set ServiceMonitor name
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: test-github-sts

  - it: should set ServiceMonitor custom namespace
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
      serviceMonitor.namespace: monitoring
    asserts:
      - equal:
          path: metadata.namespace
          value: monitoring

  - it: should include standard labels on ServiceMonitor
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: github-sts
            app.kubernetes.io/instance: test

  - it: should include custom labels on ServiceMonitor
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
      serviceMonitor.labels:
        release: prometheus
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            release: prometheus

  - it: should include custom annotations on ServiceMonitor
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
      serviceMonitor.annotations:
        custom: annotation
    asserts:
      - equal:
          path: metadata.annotations["custom"]
          value: annotation

  - it: should set default scrape configuration
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: http
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 10s

  - it: should use custom scrape config
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
      serviceMonitor.interval: 60s
      serviceMonitor.scrapeTimeout: 15s
      serviceMonitor.path: /custom-metrics
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: 60s
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 15s
      - equal:
          path: spec.endpoints[0].path
          value: /custom-metrics

  - it: should use selector labels
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/name: github-sts
            app.kubernetes.io/instance: test

  - it: should set namespaceSelector when namespace differs
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
      serviceMonitor.namespace: monitoring
    asserts:
      - contains:
          path: spec.namespaceSelector.matchNames
          content: github-sts

  # =========================================================================
  # PodMonitor
  # =========================================================================
  - it: should not create PodMonitor by default
    template: podmonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PodMonitor when enabled
    template: podmonitor.yaml
    set:
      podMonitor.enabled: true
    asserts:
      - isKind:
          of: PodMonitor
      - hasDocuments:
          count: 1

  - it: should set PodMonitor name
    template: podmonitor.yaml
    set:
      podMonitor.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: test-github-sts

  - it: should set PodMonitor custom namespace
    template: podmonitor.yaml
    set:
      podMonitor.enabled: true
      podMonitor.namespace: monitoring
    asserts:
      - equal:
          path: metadata.namespace
          value: monitoring

  - it: should include custom labels on PodMonitor
    template: podmonitor.yaml
    set:
      podMonitor.enabled: true
      podMonitor.labels:
        release: prometheus
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            release: prometheus

  - it: should include custom annotations on PodMonitor
    template: podmonitor.yaml
    set:
      podMonitor.enabled: true
      podMonitor.annotations:
        custom: annotation
    asserts:
      - equal:
          path: metadata.annotations["custom"]
          value: annotation

  - it: should set default PodMonitor scrape configuration
    template: podmonitor.yaml
    set:
      podMonitor.enabled: true
    asserts:
      - equal:
          path: spec.podMetricsEndpoints[0].port
          value: http
      - equal:
          path: spec.podMetricsEndpoints[0].path
          value: /metrics
      - equal:
          path: spec.podMetricsEndpoints[0].interval
          value: 30s
      - equal:
          path: spec.podMetricsEndpoints[0].scrapeTimeout
          value: 10s

  - it: should use custom PodMonitor scrape config
    template: podmonitor.yaml
    set:
      podMonitor.enabled: true
      podMonitor.interval: 60s
      podMonitor.scrapeTimeout: 15s
      podMonitor.path: /custom-metrics
    asserts:
      - equal:
          path: spec.podMetricsEndpoints[0].interval
          value: 60s
      - equal:
          path: spec.podMetricsEndpoints[0].scrapeTimeout
          value: 15s
      - equal:
          path: spec.podMetricsEndpoints[0].path
          value: /custom-metrics
