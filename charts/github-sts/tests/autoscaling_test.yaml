suite: Autoscaling
templates:
  - hpa.yaml
release:
  name: test
  namespace: github-sts
tests:
  # -------------------------------------------------------------------------
  # Creation
  # -------------------------------------------------------------------------
  - it: should not create HPA by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create HPA when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - hasDocuments:
          count: 1

  # -------------------------------------------------------------------------
  # Basic properties
  # -------------------------------------------------------------------------
  - it: should use correct API version
    set:
      autoscaling.enabled: true
    asserts:
      - isAPIVersion:
          of: autoscaling/v2

  - it: should reference the Deployment
    set:
      autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: apps/v1
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: test-github-sts

  - it: should include standard labels
    set:
      autoscaling.enabled: true
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: github-sts
            app.kubernetes.io/instance: test

  # -------------------------------------------------------------------------
  # Replicas
  # -------------------------------------------------------------------------
  - it: should use default replica range
    set:
      autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: should use custom replica range
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 3
      autoscaling.maxReplicas: 20
    asserts:
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 20

  # -------------------------------------------------------------------------
  # CPU target
  # -------------------------------------------------------------------------
  - it: should set CPU target by default
    set:
      autoscaling.enabled: true
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 80

  - it: should use custom CPU target
    set:
      autoscaling.enabled: true
      autoscaling.targetCPUUtilizationPercentage: 60
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 60

  # -------------------------------------------------------------------------
  # Memory target
  # -------------------------------------------------------------------------
  - it: should not set memory target by default
    set:
      autoscaling.enabled: true
    asserts:
      - notContains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory

  - it: should set memory target when configured
    set:
      autoscaling.enabled: true
      autoscaling.targetMemoryUtilizationPercentage: 75
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 75

  # -------------------------------------------------------------------------
  # Behavior
  # -------------------------------------------------------------------------
  - it: should not set behavior by default
    set:
      autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.behavior

  - it: should set custom behavior
    set:
      autoscaling.enabled: true
      autoscaling.behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
    asserts:
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 300
