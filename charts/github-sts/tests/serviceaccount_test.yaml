suite: ServiceAccount
templates:
  - serviceaccount.yaml
release:
  name: test
  namespace: github-sts
tests:
  # -------------------------------------------------------------------------
  # Creation
  # -------------------------------------------------------------------------
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - hasDocuments:
          count: 1

  - it: should use fullname as default name
    asserts:
      - equal:
          path: metadata.name
          value: test-github-sts

  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # -------------------------------------------------------------------------
  # Custom name
  # -------------------------------------------------------------------------
  - it: should use custom name when set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  # -------------------------------------------------------------------------
  # Annotations
  # -------------------------------------------------------------------------
  - it: should not have annotations by default
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should set annotations when provided
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/github-sts
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/github-sts"

  # -------------------------------------------------------------------------
  # Labels
  # -------------------------------------------------------------------------
  - it: should include standard labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: github-sts
            app.kubernetes.io/instance: test

  # -------------------------------------------------------------------------
  # automountServiceAccountToken
  # -------------------------------------------------------------------------
  - it: should not automount token by default
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should automount token when enabled
    set:
      serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
