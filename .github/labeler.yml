# Labeler configuration for automatic PR labelling
# Documentation: https://github.com/actions/labeler

# ─── Source code ────────────────────────────────────────────────────────────
helm:
  - changed-files:
      - any-glob-to-any-file:
          - "charts/**/*"

# ─── CI/CD ───────────────────────────────────────────────────────────────────
ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - "release-please-config.json"
          - ".release-please-manifest.json"

# ─── Documentation ───────────────────────────────────────────────────────────
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CHANGELOG.md"

# ─── GitHub templates & settings ─────────────────────────────────────────────
github:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".gitignore"
